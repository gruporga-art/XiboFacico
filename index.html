<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima · Veracruz · Boca del Río · Medellín · Xalapa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ============================================
           RESET Y CONFIGURACIÓN BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ============================================
           CONTENEDOR PRINCIPAL - SIN FONDO
           ============================================ */
        .widget {
            width: 100vw;
            height: 100vh;
            max-width: 1080px;
            max-height: 720px;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-radius: 0;
            padding: 2.5vh 3vw;
            box-shadow: none;
            color: #ffffff;
            border: none;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            /* Sombra más fuerte para mejor legibilidad */
            text-shadow: 0 3px 18px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 0, 0, 0.4);
        }

        /* ============================================
           ENCABEZADO - MÁS GRANDE
           ============================================ */
        .header {
            flex: 0 0 auto;
        }

        .titulo {
            font-size: clamp(1.8rem, 5vh, 3.2rem);
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 3px 20px rgba(0, 0, 0, 0.9), 0 0 40px rgba(0, 0, 0, 0.5);
        }
        .titulo i {
            color: #ffd700;
            margin-right: 0.7rem;
            filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.6));
        }

        .fecha {
            font-size: clamp(0.9rem, 2.2vh, 1.4rem);
            font-weight: 400;
            opacity: 0.95;
            border-bottom: 2px solid rgba(255, 255, 255, 0.25);
            padding-bottom: 0.6vh;
            display: inline-block;
            margin-top: 0.3vh;
            color: #f0f8ff;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.9);
        }
        .fecha i {
            color: #87ceeb;
        }

        /* ============================================
           GRID DE CIUDADES - RESPONSIVE
           ============================================ */
        .grid-ciudades {
            flex: 1 1 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.8vw;
            margin: 2vh 0;
            align-content: center;
            min-height: 0;
        }

        /* ============================================
           TARJETA DE CADA CIUDAD - MÁS GRANDE Y FUERTE
           ============================================ */
        .ciudad-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 2.2rem;
            padding: 1.8vh 0.8vw;
            border: 2px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .ciudad-card .nombre {
            font-size: clamp(1rem, 2.6vh, 1.6rem);
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            padding: 0 0.2vw;
            color: #ffffff;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.9);
            letter-spacing: 0.5px;
        }
        .ciudad-card .nombre i {
            color: #ffd700;
            font-size: 0.7em;
            margin-right: 0.4vw;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
        }

        .ciudad-card .icono {
            font-size: clamp(3.8rem, 12vh, 7.5rem);
            line-height: 1;
            color: #fff9e6;
            filter: drop-shadow(0 4px 20px rgba(255, 255, 255, 0.3));
        }
        .ciudad-card .icono i {
            animation: flotar 3s ease-in-out infinite;
            display: inline-block;
        }

        .ciudad-card .temp {
            font-size: clamp(2.8rem, 8vh, 5rem);
            font-weight: 800;
            letter-spacing: 1px;
            line-height: 1.1;
            color: #ffffff;
            text-shadow: 0 4px 25px rgba(0, 0, 0, 0.9), 0 0 50px rgba(0, 0, 0, 0.4);
        }
        .ciudad-card .temp sup {
            font-size: 0.55em;
            font-weight: 500;
            margin-left: 2px;
            color: #ffd700;
        }

        .ciudad-card .desc {
            font-size: clamp(0.75rem, 2vh, 1.2rem);
            opacity: 0.95;
            text-transform: capitalize;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            padding: 0 0.2vw;
            color: #e8f4fd;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.9);
            font-weight: 500;
            margin-top: 0.1vh;
        }

        .ciudad-card .extra {
            font-size: clamp(0.7rem, 1.8vh, 1.1rem);
            opacity: 0.85;
            display: flex;
            justify-content: center;
            gap: 1.2vw;
            margin-top: 0.4vh;
            flex-wrap: wrap;
            color: #d4edff;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.9);
            font-weight: 500;
        }
        .ciudad-card .extra i {
            margin-right: 0.3vw;
            color: #87ceeb;
            filter: drop-shadow(0 0 10px rgba(135, 206, 235, 0.4));
        }

        /* ============================================
           PIE DE PÁGINA - MÁS GRANDE
           ============================================ */
        .footer {
            flex: 0 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid rgba(255, 255, 255, 0.12);
            padding-top: 1vh;
            margin-top: 0.3vh;
        }

        .estado {
            font-size: clamp(0.75rem, 1.8vh, 1.1rem);
            padding: 0.3vh 1.5vw;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            letter-spacing: 0.5px;
            color: #e8f4fd;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.9);
            font-weight: 500;
        }

        .footer-credit {
            font-size: clamp(0.65rem, 1.6vh, 1rem);
            opacity: 0.6;
            letter-spacing: 0.5px;
            color: #c0d8e8;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.9);
        }
        .footer-credit i {
            margin: 0 0.4vw;
            color: #ffb3b3;
            filter: drop-shadow(0 0 10px rgba(255, 179, 179, 0.3));
        }

        /* ============================================
           ANIMACIONES
           ============================================ */
        @keyframes flotar {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        @keyframes pulse {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.12); }
            100% { opacity: 0.8; transform: scale(1); }
        }
        @keyframes girar {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes gota {
            0% { transform: rotate(0deg) translateY(0); }
            25% { transform: rotate(6deg) translateY(-4px); }
            75% { transform: rotate(-6deg) translateY(4px); }
            100% { transform: rotate(0deg) translateY(0); }
        }

        .fa-sun {
            animation: girar 16s linear infinite;
            color: #ffd700;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
        }
        .fa-cloud-rain {
            animation: gota 2s ease-in-out infinite;
            color: #87ceeb;
            filter: drop-shadow(0 0 20px rgba(135, 206, 235, 0.5));
        }
        .fa-cloud-sun-rain {
            animation: gota 2s ease-in-out infinite;
            color: #f0e68c;
            filter: drop-shadow(0 0 20px rgba(240, 230, 140, 0.5));
        }
        .fa-cloud {
            color: #b0c4de;
            filter: drop-shadow(0 0 20px rgba(176, 196, 222, 0.4));
        }
        .fa-moon {
            color: #e8e8e8;
            filter: drop-shadow(0 0 30px rgba(232, 232, 232, 0.5));
        }
        .fa-bolt {
            color: #ffd700;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.7));
        }
        .fa-snowflake {
            color: #e8f4fd;
            filter: drop-shadow(0 0 20px rgba(232, 244, 253, 0.5));
        }
        .fa-smog {
            color: #b0b8c0;
            filter: drop-shadow(0 0 20px rgba(176, 184, 192, 0.4));
        }

        .fa-map-pin {
            animation: pulse 2.4s ease-in-out infinite;
            color: #ffd700;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.6));
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 700px) {
            .grid-ciudades {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5vw;
            }
            .ciudad-card {
                border-radius: 1.4rem;
                padding: 1.2vh 0.5vw;
            }
            .ciudad-card .nombre {
                font-size: clamp(0.8rem, 2vh, 1.1rem);
            }
            .ciudad-card .icono {
                font-size: clamp(2.8rem, 8vh, 4.5rem);
            }
            .ciudad-card .temp {
                font-size: clamp(2rem, 5.5vh, 3.2rem);
            }
            .ciudad-card .desc {
                font-size: clamp(0.6rem, 1.4vh, 0.9rem);
            }
            .ciudad-card .extra {
                font-size: clamp(0.55rem, 1.2vh, 0.8rem);
                gap: 1vw;
            }
        }

        @media (max-width: 420px) {
            .grid-ciudades {
                grid-template-columns: 1fr 1fr;
                gap: 1vw;
            }
            .ciudad-card {
                border-radius: 1rem;
                padding: 0.8vh 0.3vw;
            }
            .ciudad-card .nombre {
                font-size: 0.7rem;
            }
            .ciudad-card .icono {
                font-size: 2.2rem;
            }
            .ciudad-card .temp {
                font-size: 1.5rem;
            }
            .ciudad-card .desc {
                font-size: 0.5rem;
            }
            .ciudad-card .extra {
                font-size: 0.45rem;
                gap: 0.5vw;
            }
            .titulo {
                font-size: clamp(1rem, 3vh, 1.5rem);
            }
            .fecha {
                font-size: 0.6rem;
            }
            .estado {
                font-size: 0.5rem;
            }
            .footer-credit {
                font-size: 0.45rem;
            }
        }
    </style>
</head>
<body>
<div class="widget">
    <!-- ===== ENCABEZADO ===== -->
    <div class="header">
        <div class="titulo">
            <i class="fas fa-map-pin"></i> Clima · Veracruz · Boca del Río · Medellín · Xalapa
        </div>
        <div class="fecha" id="fecha">
            <i class="far fa-calendar-alt" style="margin-right:6px;"></i>
            <span id="fechaTexto">Cargando...</span>
        </div>
    </div>

    <!-- ===== GRID DE CIUDADES ===== -->
    <div class="grid-ciudades" id="gridClima">
        <!-- Veracruz -->
        <div class="ciudad-card" id="cardVeracruz">
            <div class="nombre"><i class="fas fa-map-marker-alt"></i>Veracruz</div>
            <div class="icono" id="iconVeracruz"><i class="fas fa-cloud-sun"></i></div>
            <div class="temp" id="tempVeracruz">--<sup>°C</sup></div>
            <div class="desc" id="descVeracruz">Cargando...</div>
            <div class="extra">
                <span id="humVeracruz"><i class="fas fa-tint"></i> --%</span>
                <span id="vientoVeracruz"><i class="fas fa-wind"></i> --</span>
            </div>
        </div>

        <!-- Boca del Río -->
        <div class="ciudad-card" id="cardBoca">
            <div class="nombre"><i class="fas fa-map-marker-alt"></i>Boca del Río</div>
            <div class="icono" id="iconBoca"><i class="fas fa-cloud-sun"></i></div>
            <div class="temp" id="tempBoca">--<sup>°C</sup></div>
            <div class="desc" id="descBoca">Cargando...</div>
            <div class="extra">
                <span id="humBoca"><i class="fas fa-tint"></i> --%</span>
                <span id="vientoBoca"><i class="fas fa-wind"></i> --</span>
            </div>
        </div>

        <!-- Medellín de Bravo -->
        <div class="ciudad-card" id="cardMedellin">
            <div class="nombre"><i class="fas fa-map-marker-alt"></i>Medellín de Bravo</div>
            <div class="icono" id="iconMedellin"><i class="fas fa-cloud-sun"></i></div>
            <div class="temp" id="tempMedellin">--<sup>°C</sup></div>
            <div class="desc" id="descMedellin">Cargando...</div>
            <div class="extra">
                <span id="humMedellin"><i class="fas fa-tint"></i> --%</span>
                <span id="vientoMedellin"><i class="fas fa-wind"></i> --</span>
            </div>
        </div>

        <!-- Xalapa -->
        <div class="ciudad-card" id="cardXalapa">
            <div class="nombre"><i class="fas fa-map-marker-alt"></i>Xalapa</div>
            <div class="icono" id="iconXalapa"><i class="fas fa-cloud-sun"></i></div>
            <div class="temp" id="tempXalapa">--<sup>°C</sup></div>
            <div class="desc" id="descXalapa">Cargando...</div>
            <div class="extra">
                <span id="humXalapa"><i class="fas fa-tint"></i> --%</span>
                <span id="vientoXalapa"><i class="fas fa-wind"></i> --</span>
            </div>
        </div>
    </div>

    <!-- ===== PIE DE PÁGINA ===== -->
    <div class="footer">
        <div class="estado" id="estado">🌐 Cargando datos...</div>
        <div class="footer-credit">
            <i class="fas fa-cloud-sun-rain"></i> Datos en tiempo real · OpenWeather
        </div>
    </div>
</div>

<script>
    (function() {
        var API_KEY = '7914fbf24ae32bef2b949b6c2e9e62f0';

        var ciudades = [{
            id: 'Veracruz',
            pais: 'MX',
            nombre: 'Veracruz',
            card: 'cardVeracruz',
            temp: 'tempVeracruz',
            icon: 'iconVeracruz',
            desc: 'descVeracruz',
            hum: 'humVeracruz',
            viento: 'vientoVeracruz',
            tipo: 'nombre'
        }, {
            lat: 19.1,
            lon: -96.1,
            nombre: 'Boca del Río',
            card: 'cardBoca',
            temp: 'tempBoca',
            icon: 'iconBoca',
            desc: 'descBoca',
            hum: 'humBoca',
            viento: 'vientoBoca',
            tipo: 'coordenadas'
        }, {
            id: 'Medellín de Bravo',
            pais: 'MX',
            nombre: 'Medellín de Bravo',
            card: 'cardMedellin',
            temp: 'tempMedellin',
            icon: 'iconMedellin',
            desc: 'descMedellin',
            hum: 'humMedellin',
            viento: 'vientoMedellin',
            tipo: 'nombre'
        }, {
            id: 'Xalapa',
            pais: 'MX',
            nombre: 'Xalapa',
            card: 'cardXalapa',
            temp: 'tempXalapa',
            icon: 'iconXalapa',
            desc: 'descXalapa',
            hum: 'humXalapa',
            viento: 'vientoXalapa',
            tipo: 'nombre'
        }];

        function actualizarFecha() {
            try {
                var a = new Date();
                var m = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];
                var d = ['dom', 'lun', 'mar', 'mié', 'jue', 'vie', 'sáb'];
                var fechaStr = d[a.getDay()] + ' ' + a.getDate() + ' de ' + m[a.getMonth()] + ' de ' + a.getFullYear() +
                    ', ' + String(a.getHours()).padStart(2, '0') + ':' + String(a.getMinutes()).padStart(2, '0') + ' h.';
                document.getElementById('fechaTexto').textContent = fechaStr;
            } catch (e) {}
        }

        function getIconoFA(c) {
            var m = {
                '01d': 'fa-sun',
                '01n': 'fa-moon',
                '02d': 'fa-cloud-sun',
                '02n': 'fa-cloud-moon',
                '03d': 'fa-cloud',
                '03n': 'fa-cloud',
                '04d': 'fa-cloud',
                '04n': 'fa-cloud',
                '09d': 'fa-cloud-rain',
                '09n': 'fa-cloud-rain',
                '10d': 'fa-cloud-sun-rain',
                '10n': 'fa-cloud-moon-rain',
                '11d': 'fa-bolt',
                '11n': 'fa-bolt',
                '13d': 'fa-snowflake',
                '13n': 'fa-snowflake',
                '50d': 'fa-smog',
                '50n': 'fa-smog'
            };
            return m[c] || 'fa-cloud';
        }

        function mostrarDatos(ciudad, data) {
            try {
                var t = Math.round(data.main.temp);
                var h = data.main.humidity;
                var v = Math.round(data.wind.speed * 3.6);
                var desc = data.weather[0].description;
                var icono = getIconoFA(data.weather[0].icon);

                document.getElementById(ciudad.temp).innerHTML = t + '<sup>°C</sup>';
                document.getElementById(ciudad.desc).textContent = desc;
                document.getElementById(ciudad.hum).innerHTML = '<i class="fas fa-tint"></i> ' + h + '%';
                document.getElementById(ciudad.viento).innerHTML = '<i class="fas fa-wind"></i> ' + v + ' km/h';

                var ic = document.getElementById(ciudad.icon);
                ic.innerHTML = '<i class="fas ' + icono + '"></i>';
            } catch (e) {}
        }

        function obtenerClima() {
            try {
                document.getElementById('estado').textContent = '🌐 Actualizando...';
                document.getElementById('estado').style.background = 'rgba(0,0,0,0.3)';
                document.getElementById('estado').style.borderColor = 'rgba(255,255,255,0.15)';

                var promesas = ciudades.map(function(c) {
                    var url;
                    if (c.tipo === 'coordenadas') {
                        url = 'https://api.openweathermap.org/data/2.5/weather?lat=' + c.lat + '&lon=' + c.lon +
                            '&units=metric&lang=es&appid=' + API_KEY;
                    } else {
                        url = 'https://api.openweathermap.org/data/2.5/weather?q=' + encodeURIComponent(c.id) +
                            ',' + c.pais + '&units=metric&lang=es&appid=' + API_KEY;
                    }
                    return fetch(url)
                        .then(function(r) {
                            if (!r.ok) {
                                if (c.tipo === 'coordenadas') {
                                    return fetch('https://api.openweathermap.org/data/2.5/weather?q=' +
                                        encodeURIComponent(c.nombre) + ',MX&units=metric&lang=es&appid=' +
                                        API_KEY);
                                }
                                throw new Error('Error ' + r.status);
                            }
                            return r;
                        })
                        .then(function(r) {
                            if (!r.ok) throw new Error('Error ' + r.status);
                            return r.json();
                        })
                        .then(function(data) {
                            mostrarDatos(c, data);
                        })
                        .catch(function(e) {
                            console.warn('Error con ' + c.nombre + ':', e);
                        });
                });

                Promise.all(promesas).then(function() {
                    document.getElementById('estado').textContent = '✅ Actualizado';
                    document.getElementById('estado').style.background = 'rgba(0,255,100,0.15)';
                    document.getElementById('estado').style.borderColor = 'rgba(0,255,100,0.2)';
                    actualizarFecha();
                }).catch(function(e) {
                    console.warn('Error general:', e);
                });
            } catch (e) {
                console.warn('Error:', e);
            }
        }

        obtenerClima();
        setInterval(obtenerClima, 300000);
        setInterval(actualizarFecha, 60000);
        actualizarFecha();
    })();
</script>
</body>
</html>
