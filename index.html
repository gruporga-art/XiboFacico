<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Veracruz · Widget para Xibo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif;}
        body{background:linear-gradient(145deg,#0b2a3e 0%,#1b4f6e 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:1.5rem;}
        .widget{max-width:420px;width:100%;background:rgba(255,255,255,0.08);backdrop-filter:blur(14px);border-radius:3rem 3rem 2rem 2rem;padding:2rem 1.8rem 2.2rem;box-shadow:0 25px 50px rgba(0,0,0,0.7);color:#f0f9ff;border:1px solid rgba(255,255,255,0.1);text-align:center;}
        .ciudad{display:flex;align-items:center;justify-content:center;gap:0.6rem;font-size:1.9rem;font-weight:600;margin-bottom:0.2rem;}
        .ciudad i{color:#ffd966;font-size:2rem;filter:drop-shadow(0 0 8px rgba(255,215,0,0.5));animation:pulse 2.4s ease-in-out infinite;}
        .fecha{font-size:0.85rem;font-weight:300;opacity:0.75;margin-bottom:1rem;border-bottom:1px dashed rgba(255,255,255,0.15);padding-bottom:0.6rem;display:inline-block;}
        .icono{font-size:5.5rem;line-height:1;margin:0.2rem 0;color:#fff9e6;filter:drop-shadow(0 8px 20px rgba(0,0,0,0.4));display:inline-block;animation:flotar 3s ease-in-out infinite;}
        .temp{font-size:4rem;font-weight:700;margin:0.2rem 0 0.1rem;letter-spacing:2px;text-shadow:0 4px 12px rgba(0,0,0,0.3);}
        .temp sup{font-size:2rem;font-weight:400;margin-left:4px;}
        .desc{font-size:1.4rem;font-weight:500;margin-bottom:0.6rem;background:rgba(0,0,0,0.25);padding:0.2rem 1.5rem;border-radius:60px;display:inline-block;border:1px solid rgba(255,255,255,0.06);text-transform:capitalize;}
        .extras{display:flex;justify-content:space-around;margin:1.5rem 0 0.8rem;flex-wrap:wrap;gap:0.8rem;}
        .extra{background:rgba(0,0,0,0.2);padding:0.5rem 1.2rem;border-radius:40px;border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:0.6rem;font-size:1rem;min-width:100px;justify-content:center;}
        .extra i{font-size:1.2rem;color:#b3e4ff;width:1.6rem;text-align:center;}
        .detalles{font-size:0.85rem;opacity:0.6;margin-top:0.3rem;display:flex;justify-content:center;gap:1.2rem;flex-wrap:wrap;}
        .estado{display:inline-block;padding:0.2rem 0.8rem;border-radius:20px;font-size:0.6rem;margin-top:0.3rem;letter-spacing:0.5px;background:rgba(100,200,255,0.15);border:1px solid rgba(100,200,255,0.2);}
        .footer{margin-top:1.5rem;font-size:0.7rem;opacity:0.4;letter-spacing:1px;border-top:1px solid rgba(255,255,255,0.05);padding-top:1rem;}
        @keyframes pulse{0%{opacity:0.8;transform:scale(1);}50%{opacity:1;transform:scale(1.12);}100%{opacity:0.8;transform:scale(1);}}
        @keyframes flotar{0%{transform:translateY(0px);}50%{transform:translateY(-8px);}100%{transform:translateY(0px);}}
        @keyframes girar{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
        @keyframes gota{0%{transform:rotate(0deg) translateY(0);}25%{transform:rotate(6deg) translateY(-2px);}75%{transform:rotate(-6deg) translateY(2px);}100%{transform:rotate(0deg) translateY(0);}}
        .fa-sun{animation:girar 16s linear infinite;color:#ffe484;}
        .fa-cloud-rain{animation:gota 2s ease-in-out infinite;}
        .fa-cloud-sun-rain{animation:gota 2s ease-in-out infinite;}
        @media(max-width:460px){.widget{padding:1.8rem 1rem;}.temp{font-size:3.2rem;}.icono{font-size:4.5rem;}.extra{font-size:0.8rem;padding:0.4rem 0.8rem;min-width:80px;}}
    </style>
</head>
<body>
<div class="widget">
    <div class="ciudad"><i class="fas fa-map-pin"></i><span>Veracruz, MX</span></div>
    <div class="fecha" id="fecha"><i class="far fa-calendar-alt" style="margin-right:6px;"></i> <span id="fechaTexto">Cargando...</span></div>
    <div class="icono" id="iconoClima"><i class="fas fa-cloud-sun" style="font-size:5.5rem;"></i><i class="fas fa-cloud" style="font-size:3rem;margin-left:0.2rem;opacity:0.3;"></i></div>
    <div class="temp" id="temperatura">--<sup>°C</sup></div>
    <div class="desc"><i class="fas fa-umbrella" style="margin-right:6px;opacity:0.8;"></i> <span id="descripcion">Cargando...</span></div>
    <div class="extras">
        <div class="extra"><i class="fas fa-tint"></i><span id="humedad">--%</span></div>
        <div class="extra"><i class="fas fa-wind"></i><span id="viento">-- km/h</span></div>
        <div class="extra"><i class="fas fa-compress-alt"></i><span id="presion">-- hPa</span></div>
    </div>
    <div class="detalles">
        <span id="sensacion"><i class="fas fa-thermometer-half"></i> Sensación: --°C</span>
        <span id="amanecer"><i class="fas fa-sunrise"></i> --:--</span>
        <span id="atardecer"><i class="fas fa-sunset"></i> --:--</span>
    </div>
    <div class="estado" id="estado">🌐 Cargando...</div>
    <div class="footer"><i class="fas fa-cloud-sun-rain"></i> Datos en tiempo real · OpenWeather</div>
</div>
<script>
(function(){
    var API_KEY='7914fbf24ae32bef2b949b6c2e9e62f0';
    function actualizarFecha(){
        try{
            var a=new Date();
            var m=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
            var d=['dom','lun','mar','mié','jue','vie','sáb'];
            var fechaStr=d[a.getDay()]+' '+a.getDate()+' de '+m[a.getMonth()]+' de '+a.getFullYear()+', '+String(a.getHours()).padStart(2,'0')+':'+String(a.getMinutes()).padStart(2,'0')+' h.';
            document.getElementById('fechaTexto').textContent=fechaStr;
        }catch(e){}
    }
    var datosEjemplo={temp:30,sensacion:32,humedad:72,viento:14,presion:1013,descripcion:'Parcialmente nublado',icono:'fa-cloud-sun',amanecer:'06:48',atardecer:'19:12'};
    function getIconoFA(c){var m={'01d':'fa-sun','01n':'fa-moon','02d':'fa-cloud-sun','02n':'fa-cloud-moon','03d':'fa-cloud','03n':'fa-cloud','04d':'fa-cloud','04n':'fa-cloud','09d':'fa-cloud-rain','09n':'fa-cloud-rain','10d':'fa-cloud-sun-rain','10n':'fa-cloud-moon-rain','11d':'fa-bolt','11n':'fa-bolt','13d':'fa-snowflake','13n':'fa-snowflake','50d':'fa-smog','50n':'fa-smog'};return m[c]||'fa-cloud';}
    function mostrarDatos(d){
        try{
            document.getElementById('temperatura').innerHTML=d.temp+'<sup>°C</sup>';
            document.getElementById('descripcion').textContent=d.descripcion;
            document.getElementById('humedad').textContent=d.humedad+'%';
            document.getElementById('viento').textContent=d.viento+' km/h';
            document.getElementById('presion').textContent=d.presion+' hPa';
            document.getElementById('sensacion').innerHTML='<i class="fas fa-thermometer-half"></i> Sensación: '+d.sensacion+'°C';
            document.getElementById('amanecer').innerHTML='<i class="fas fa-sunrise"></i> '+d.amanecer;
            document.getElementById('atardecer').innerHTML='<i class="fas fa-sunset"></i> '+d.atardecer;
            var ic=document.getElementById('iconoClima');
            ic.innerHTML='<i class="fas '+d.icono+'" style="font-size:5.5rem;"></i><i class="fas fa-cloud" style="font-size:3rem;margin-left:0.2rem;opacity:0.3;"></i>';
            document.getElementById('estado').textContent='✅ Actualizado';
            document.getElementById('estado').style.background='rgba(0,255,100,0.15)';
            document.getElementById('estado').style.borderColor='rgba(0,255,100,0.2)';
            actualizarFecha();
        }catch(e){}
    }
    function obtenerClima(){
        try{
            document.getElementById('estado').textContent='🌐 Conectando...';
            document.getElementById('estado').style.background='rgba(100,200,255,0.15)';
            document.getElementById('estado').style.borderColor='rgba(100,200,255,0.2)';
            var url='https://api.openweathermap.org/data/2.5/weather?q=Veracruz,MX&units=metric&lang=es&appid='+API_KEY;
            fetch(url).then(function(r){if(!r.ok)return fetch('https://api.openweathermap.org/data/2.5/weather?id=3514783&units=metric&lang=es&appid='+API_KEY);return r;})
            .then(function(r){if(!r.ok)return fetch('https://api.openweathermap.org/data/2.5/weather?lat=19.1738&lon=-96.1342&units=metric&lang=es&appid='+API_KEY);return r;})
            .then(function(r){if(!r.ok)throw new Error('API no disponible');return r.json();})
            .then(function(data){if(!data.main||!data.weather)throw new Error('Datos incompletos');
                var t=Math.round(data.main.temp),s=Math.round(data.main.feels_like),h=data.main.humidity,v=Math.round(data.wind.speed*3.6),p=data.main.pressure,desc=data.weather[0].description,icon=data.weather[0].icon;
                var am=new Date(data.sys.sunrise*1000),at=new Date(data.sys.sunset*1000);
                var fH=function(d){return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');};
                mostrarDatos({temp:t,sensacion:s,humedad:h,viento:v,presion:p,descripcion:desc,icono:getIconoFA(icon),amanecer:fH(am),atardecer:fH(at)});
            })
            .catch(function(e){console.warn('API falló:',e);mostrarDatos(datosEjemplo);document.getElementById('estado').textContent='📡 Datos de ejemplo';document.getElementById('estado').style.background='rgba(255,150,0,0.2)';document.getElementById('estado').style.borderColor='rgba(255,150,0,0.3)';});
        }catch(e){mostrarDatos(datosEjemplo);}
    }
    obtenerClima();
    setInterval(obtenerClima,300000);
    setInterval(actualizarFecha,60000);
    actualizarFecha();
})();
</script>
</body>
</html>
